name: Functions Backfill

on:
  push:
    paths:
      - 'functions/src/backfill/**'
      - 'functions/__tests__/**'
      - 'functions/package.json'
      - 'functions/tsconfig.json'
      - '.github/workflows/functions-backfill.yml'
  pull_request:
    paths:
      - 'functions/src/backfill/**'
      - 'functions/__tests__/**'
      - 'functions/package.json'
      - 'functions/tsconfig.json'
      - '.github/workflows/functions-backfill.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install dependencies
        run: npm install
        working-directory: functions
      - name: Build backfill sources
        run: npm run build
        working-directory: functions
      - name: Run backfill tests
        run: npm run test:backfill
        working-directory: functions
