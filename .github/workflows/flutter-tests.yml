name: Flutter Tests & Firestore Audit

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter --version
      - run: flutter pub get
      - name: Run unit tests
        run: flutter test --concurrency=1
      - name: Firestore query audit
        run: bash scripts/firestore_query_audit.sh
